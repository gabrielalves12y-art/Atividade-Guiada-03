<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Intuititva</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section>
            <img src="img/Designer (1).png" alt="Logotipo da lótus" width="200" height="200">
        </section>

        <section class="login">
            <h1>Bem-vindo!</h1>
            <h2>Realize seu login</h2>

            <form class="login-form">
                <label for="login">Login:</label>
                <input type="text" id="nome" class="campo-login" placeholder="Informe seu login">
                <label for="senha">Senha:</label>
                <input type="senha" id="senha" class="campo-login" placeholder="Digite sua senha">
                <div class="login-form">
                    <a href="#" class="recuperacao">Esqueci minha senha!</a>
                </div>
                <button type="submit" class="botao-login">Entrar</button>
            </form>
            
        </section>
        
    </main>

    <footer>
        <p>© 2026 Interface Intuitiva. Todos os direitos reservados.</p>

    </footer>
</body>

</html>
